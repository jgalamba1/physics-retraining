<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="orb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.08" stroke="#60a5fa" stroke-width="0.8">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Orbital ellipse 1 — tilted 30° -->
  <ellipse cx="256" cy="256" rx="170" ry="58"
    transform="rotate(30 256 256)"
    fill="none" stroke="url(#ring1)" stroke-width="4.5" opacity="0.85"
    filter="url(#glow)"/>

  <!-- Orbital ellipse 2 — tilted -30° -->
  <ellipse cx="256" cy="256" rx="170" ry="58"
    transform="rotate(-30 256 256)"
    fill="none" stroke="url(#ring2)" stroke-width="4.5" opacity="0.75"
    filter="url(#glow)"/>

  <!-- Orbital ellipse 3 — vertical -->
  <ellipse cx="256" cy="256" rx="170" ry="58"
    transform="rotate(90 256 256)"
    fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.45"/>

  <!-- Nucleus glow backdrop -->
  <circle cx="256" cy="256" r="44" fill="#1e40af" opacity="0.5" filter="url(#softglow)"/>

  <!-- Nucleus -->
  <circle cx="256" cy="256" r="34" fill="url(#orb)" filter="url(#glow)"/>
  <circle cx="244" cy="244" r="10" fill="white" opacity="0.25"/>

  <!-- Electron dots on orbits -->
  <!-- On ring1 at ~60° position -->
  <circle cx="382" cy="195" r="8" fill="#60a5fa" filter="url(#glow)" opacity="0.95"/>
  <!-- On ring2 at ~-60° position -->
  <circle cx="130" cy="195" r="8" fill="#f472b6" filter="url(#glow)" opacity="0.9"/>
  <!-- On vertical ring top -->
  <circle cx="256" cy="86" r="8" fill="#a78bfa" filter="url(#glow)" opacity="0.9"/>

  <!-- Psi symbol (ψ) in nucleus — simplified as text -->
  <text x="256" y="268" text-anchor="middle"
    font-family="Georgia, serif" font-size="38" font-weight="bold"
    fill="white" opacity="0.92">ψ</text>

  <!-- Bottom label -->
  <text x="256" y="460" text-anchor="middle"
    font-family="Georgia, serif" font-size="28" letter-spacing="4"
    fill="#93c5fd" opacity="0.85">PHYSICS</text>
</svg>
