name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js (no cache= avoids package-lock.json requirement) ──────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Java ───────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Install npm dependencies (npm install not npm ci) ──────────────────
      - name: Install dependencies
        run: npm install

      # ── 5. Build web assets ───────────────────────────────────────────────────
      - name: Build web assets
        run: npm run build

      # ── 6. Android SDK ────────────────────────────────────────────────────────
      - name: Set up Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # ── 7. Capacitor add android ──────────────────────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      # ── 8. Copy adaptive icons into Android project ───────────────────────────
      - name: Generate adaptive icons
        run: node generate-icons.js

      # ── 9. Sync Capacitor ─────────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 10. Decode keystore from GitHub Secret ────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      # ── 11. Build signed release APK ──────────────────────────────────────────
      - name: Build signed release APK
        working-directory: android
        env:
          STORE_FILE: ${{ github.workspace }}/release.jks
          STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS:  ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASS:   ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$STORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            --no-daemon

      # ── 12. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 13. Clean up keystore ─────────────────────────────────────────────────
      - name: Remove keystore
        if: always()
        run: rm -f release.jks

      # ── 14. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: physics-curriculum-release-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: physics-curriculum-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
