name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Java (Android SDK requirement) ────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Android SDK ────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm deps ───────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Build React/Vite ───────────────────────────────────────────────────
      - name: Build web assets
        run: npm run build

      # ── 7. Capacitor: add android + sync ──────────────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      - name: Copy icons into Android project
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          # Copy base icon into all densities (CI will use the 512px PNG as source)
          cp public/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp public/icon-192.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/icon-192.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Sync Capacitor
        run: npx cap sync android

      # ── 8. Gradle: build debug APK ────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── 9. Upload APK artifact ────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: physics-curriculum-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 10. (Optional) Build release APK — unsigned ───────────────────────────
      - name: Build unsigned release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: physics-curriculum-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
